# Project: KONA-style Energy-Based Reasoning for Open LLMs
# Configuration File

model:
  name: "Qwen/Qwen2.5-3B-Instruct"
  # Fallback options: "meta-llama/Llama-3.2-3B-Instruct", "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
  dtype: "bfloat16"  # or "float16", "int8", "int4"
  device: "auto"
  max_new_tokens: 512

generation:
  num_candidates: 5        # N responses for reranking
  temperature: 0.7
  top_p: 0.9
  max_length: 1024

energy:
  method: "self_consistency"  # self_consistency, embedding, neural_ebm
  scorer_model: null          # path to trained scorer for neural_ebm

benchmarks:
  primary:
    - gsm8k
    - arc
    - bbh
  secondary:
    - truthfulqa
    - mmlu_subset

latent_optimization:
  enabled: false
  steps: 10
  lr: 0.1

logging:
  level: "INFO"
  save_results: true
  results_dir: "results"
